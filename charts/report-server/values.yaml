replicaCount: 1

image: docker.io/beingyash/report-server:v0.1.0
imagePullPolicy: Always

service:
  port: 3000

ingress:
  host: reports.yash.abysmallab.in
  className: traefik

gitSync:
  repository: https://github.com/beingyash/report-server.git
  ref: main
  interval: 60

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi
