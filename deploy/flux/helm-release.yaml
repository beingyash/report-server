apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: report-server
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: charts/report-server
      sourceRef:
        kind: GitRepository
        name: report-server-chart
        namespace: flux-system
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
